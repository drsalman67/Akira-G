name: Akira-G Cloud Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ye naya step hai: Cloud apna Gradle khud layega!
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.6'

    # Notice kar: Yahan ./gradlew nahi, seedha gradle use kiya hai!
    - name: Build Debug APK with Gradle
      run: gradle assembleDebug

    - name: Upload Garma-Garam APK
      uses: actions/upload-artifact@v4
      with:
        name: Akira-G-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
